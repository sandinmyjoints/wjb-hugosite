{{ define "main" }}
{{/* Homepage. Renders at /. Lists all posts, newest first. */}}
<ul class="post-list">
  {{ range (where site.RegularPages "Section" "posts") }}
  <li>
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
  </li>
  {{ end }}
</ul>
{{ end }}
