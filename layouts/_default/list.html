{{ define "main" }}
{{/* List pages. Used for /tags/foo/, /categories/bar/, /posts/, etc. */}}
<h2>{{ .Title }}</h2>
<ul class="post-list">
  {{ range .Pages }}
  <li>
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
  </li>
  {{ end }}
</ul>
{{ end }}
